name: CI ✨

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  choose-runner:
    name: 🧭 Choose Runner
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - name: 🔎 Pick available runner
        id: pick
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RUNNERS_READ_TOKEN }}
          script: |
            const selfHostedRunnerLabels = ['self-hosted', 'linux', 'x64', 'docker'];
            const selfHostedRunner = JSON.stringify(selfHostedRunnerLabels);
            const githubHostedRunner = JSON.stringify('ubuntu-latest');

            const isPullRequest = context.eventName === 'pull_request';
            const headRepo = context.payload.pull_request?.head?.repo?.full_name;
            const baseRepo = context.payload.repository?.full_name;
            const isFork = isPullRequest && headRepo !== baseRepo;
            const isPublicRepo = context.payload.repository?.private === false;

            core.info(`event=${context.eventName}`);
            core.info(`headRepo=${headRepo}`);
            core.info(`baseRepo=${baseRepo}`);
            core.info(`isFork=${isFork}`);
            core.info(`isPublicRepo=${isPublicRepo}`);

            if (isPublicRepo) {
              core.info('Public repository detected. Forcing GitHub-hosted runner.');
              core.setOutput('runner', githubHostedRunner);
              return;
            }

            if (isFork) {
              core.info('Fork pull request detected. Forcing GitHub-hosted runner.');
              core.setOutput('runner', githubHostedRunner);
              return;
            }

            async function listRunners() {
              try {
                return await github.paginate(
                  github.rest.actions.listSelfHostedRunnersForOrg,
                  {
                    org: context.repo.owner,
                    per_page: 100,
                  }
                );
              } catch (error) {
                core.warning(
                  `Could not list organization self-hosted runners: ${error.message}. Trying repository runners.`
                );

                return github.paginate(
                  github.rest.actions.listSelfHostedRunnersForRepo,
                  {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    per_page: 100,
                  }
                );
              }
            }

            try {
              const runners = await listRunners();
              runners.forEach((runner) => {
                core.info(`Runner: ${runner.name} | status=${runner.status} | busy=${runner.busy} | labels=${runner.labels.map((l) => l.name).join(', ')}`);
              });
              const available = runners.some((runner) => {
                const runnerLabels = runner.labels.map((label) => label.name.toLowerCase());
                return runner.status === 'online' && runner.busy === false && selfHostedRunnerLabels.every((label) => runnerLabels.includes(label));
              });

              core.setOutput('runner', available ? selfHostedRunner : githubHostedRunner);
              core.info(`Selected runner: ${available ? selfHostedRunner : githubHostedRunner}`);
            } catch (error) {
              core.warning(
                `Could not inspect self-hosted runners: ${error.message}. Falling back to ubuntu-latest.`
              );
              core.setOutput('runner', githubHostedRunner);
            }
  setup:
    name: 🛠️ Setup
    needs: [choose-runner]
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    outputs:
      node-version: 24.13.0
      pnpm-version: 10.28.2
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 🔧 Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: 24.13.0
          pnpm-version: 10.28.2

      - name: 📁 Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 📦 Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 🔍 Check Peer dependencies
        run: pnpm install --resolution-only --no-frozen-lockfile

      - name: 📚 Install dependencies
        run: pnpm install

      - name: 💾 Cache workspace
        uses: actions/cache@v4
        with:
          path: .
          key: workspace-${{ github.sha }}

  lint:
    name: 🧹 Lint
    needs: [choose-runner, setup]
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    steps:
      - name: 📂 Restore workspace
        uses: actions/cache@v4
        with:
          path: .
          key: workspace-${{ github.sha }}

      - name: 🔧 Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          pnpm-version: ${{ needs.setup.outputs.pnpm-version }}

      - name: 🔍 Run ESLint
        run: pnpm lint

  build:
    name: 🏗️ Build
    needs: [choose-runner, lint, setup]
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    steps:
      - name: 📂 Restore workspace
        uses: actions/cache@v4
        with:
          path: .
          key: workspace-${{ github.sha }}

      - name: 🔧 Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          pnpm-version: ${{ needs.setup.outputs.pnpm-version }}

      - name: 🔨 Build packages
        env:
          NODE_ENV: production
          CI: true
        run: pnpm -r build

      - name: 💾 Cache built workspace
        uses: actions/cache@v4
        with:
          path: .
          key: workspace-built-${{ github.sha }}

  typecheck:
    name: 🔎 Type Check
    needs: [choose-runner, build, setup]
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    steps:
      - name: 📂 Restore built workspace
        uses: actions/cache@v4
        with:
          path: .
          key: workspace-built-${{ github.sha }}

      - name: 🔧 Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          pnpm-version: ${{ needs.setup.outputs.pnpm-version }}

      - name: 📋 Type check
        run: pnpm -r run typecheck

  test:
    name: 🧪 Test
    needs: [choose-runner, build, setup]
    runs-on: ${{ fromJSON(needs.choose-runner.outputs.runner) }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📂 Restore built workspace
        uses: actions/cache@v4
        with:
          path: .
          key: workspace-built-${{ github.sha }}

      - name: 🔧 Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          pnpm-version: ${{ needs.setup.outputs.pnpm-version }}

      - name: 🧪 Run test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          API_PORT: 3000
          DATABASE_PORT: 5432
          DATABASE_HOST: localhost
          DATABASE_USER: test_user
          DATABASE_PASSWORD: test_password
          DATABASE_NAME: test_db

          EMAIL_HOST: localhost
          EMAIL_PORT: 1025
          EMAIL_SECURE: false
          EMAIL_FROM: test@example.com

          BETTER_AUTH_SECRET: test_secret
          TRUSTED_ORIGINS: '*'
          NODE_ENV: test
