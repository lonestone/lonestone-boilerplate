packages:
  - packages/*
  - apps/*
  # Upgrade tooling; safe to delete the directory to detach from the boilerplate
  - .boilerplate

catalogs:
  auth:
    '@better-auth/expo': ^1.4.6
    better-auth: ^1.6.9
  build:
    '@types/node': ^25.6.0
    typescript: ^5.9.3
    vite: ^7.3.1
    vite-tsconfig-paths: ^6.0.5
  frontend:
    '@hookform/resolvers': ^5.2.2
    '@react-router/dev': ^7.14.2
    '@react-router/node': ^7.14.2
    '@react-router/serve': ^7.14.2
    '@tailwindcss/typography': ^0.5.19
    '@tailwindcss/vite': ^4.2.4
    '@tanstack/react-query': ^5.100.6
    '@types/react': ^19.2.14
    '@types/react-dom': ^19.2.3
    i18next: ^26.0.8
    react: ^19.2.5
    react-dom: ^19.2.5
    react-hook-form: ^7.74.0
    react-i18next: ^17.0.6
    react-router: ^7.14.2
    react-router-devtools: ^6.2.0
    tailwind-merge: ^3.5.0
    tailwindcss: ^4.2.4
    tailwindcss-animate: ^1.0.7
  validation:
    zod: ~4.3.6
    zod-openapi: 5.4.6

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@scarf/scarf'
  - '@tailwindcss/oxide'
  - cpu-features
  - esbuild
  - nestjs-pino
  - protobufjs
  - sharp
  - ssh2
  - unrs-resolver

peerDependencyRules:
  allowedVersions:
    eslint: '9|10'

strictPeerDependencies: true
